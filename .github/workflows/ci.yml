name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore BingehOS.sln

      - name: Build
        run: dotnet build BingehOS.sln --no-restore --configuration Release

      - name: Unit tests
        run: dotnet test tests/BingehOS.UnitTests/BingehOS.UnitTests.csproj --no-build --configuration Release --verbosity normal

      - name: Integration tests (Testcontainers needs Docker, available on runner)
        run: dotnet test tests/BingehOS.IntegrationTests/BingehOS.IntegrationTests/BingehOS.IntegrationTests.csproj --no-build --configuration Release --verbosity normal
