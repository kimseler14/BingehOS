name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore FacilityOS.sln

      - name: Build
        run: dotnet build FacilityOS.sln --no-restore --configuration Release

      - name: Unit tests
        run: dotnet test tests/FacilityOS.UnitTests/FacilityOS.UnitTests.csproj --no-build --configuration Release --verbosity normal

      - name: Integration tests (Testcontainers needs Docker, available on runner)
        run: dotnet test tests/FacilityOS.IntegrationTests/FacilityOS.IntegrationTests/FacilityOS.IntegrationTests.csproj --no-build --configuration Release --verbosity normal
